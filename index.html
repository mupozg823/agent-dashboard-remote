<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1A1A3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;에이전트 개발국&quot;,&quot;short_name&quot;:&quot;개발국&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%231A1A3A&quot;,&quot;theme_color&quot;:&quot;%231A1A3A&quot;}">
<title>에이전트 개발국 ++ (Remote)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Galmuri11&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#FFD080;--gold-d:#8B6914;--gold-dd:#5A4008;--bg:#E8D8C0;--panel:#FFF0D0;--text:#2A1B0A;
  --ok:#44AA44;--err:#CC3300;--warn:#CCAA22;--info:#6666CC;--accent:#CC6600;
  --safe:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
body{font-family:'Galmuri11','Malgun Gothic',monospace;background:#1A1A3A;color:var(--text);overflow:hidden;
  height:100vh;height:100dvh;user-select:none;-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;touch-action:manipulation}

/* ── App Shell (mobile-first) ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}

/* ── Top Bar ── */
.top{background:#1A1A3A;border-bottom:3px solid var(--gold-d);display:flex;align-items:center;
  padding:2px 10px;padding-top:calc(2px + var(--safe-t));gap:8px;min-height:40px;flex-shrink:0;z-index:20}
.top .live{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .3s}
.live.on{background:#44CC44;box-shadow:0 0 8px #44CC44}
.live.off{background:#CC0000;box-shadow:0 0 8px #CC0000;animation:pulse 1.5s infinite}
@keyframes pulse{50%{opacity:.3}}
.top .logo{font-size:13px;font-weight:bold;color:var(--gold);text-shadow:1px 1px 0 #000;white-space:nowrap}
.top .logo .sub{font-size:9px;color:#BBCCDD;font-weight:normal}
.stats{display:flex;gap:6px;flex:1;justify-content:flex-end;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stats::-webkit-scrollbar{display:none}
.stat{color:#DDD;font-size:11px;display:flex;align-items:center;gap:2px;white-space:nowrap;flex-shrink:0}
.stat b{color:var(--gold);font-size:12px}
.stat .delta{font-size:8px;margin-left:1px}
.stat .delta.up{color:#44CC44}.stat .delta.dn{color:#CC3300}

/* ── Scene (fills available space) ── */
.scene{flex:1;position:relative;overflow:hidden;background:#D4C8A0;min-height:0}
canvas{display:block;width:100%;height:100%}

/* ── Connection Badge ── */
.conn{position:absolute;top:6px;right:8px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:bold;
  z-index:10;border:2px solid;transition:all .3s;backdrop-filter:blur(4px)}
.conn.on{background:#DFF5D0e0;color:#228B22;border-color:#228B22}
.conn.off{background:#FFD0D0e0;color:#CC0000;border-color:#CC0000}

/* ── Signal bars ── */
.signal{display:inline-flex;gap:1px;align-items:flex-end;height:10px;margin-left:4px;vertical-align:middle}
.signal i{width:3px;background:#228B22;border-radius:1px;transition:opacity .3s}
.signal i:nth-child(1){height:3px}.signal i:nth-child(2){height:5px}.signal i:nth-child(3){height:7px}.signal i:nth-child(4){height:10px}
.signal.weak i:nth-child(3),.signal.weak i:nth-child(4){opacity:.2}
.signal.mid i:nth-child(4){opacity:.2}

/* ── Toast Notifications ── */
.toast-wrap{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:4px;
  pointer-events:none;width:90%;max-width:360px}
.toast{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:bold;text-align:center;
  animation:toastIn .3s ease-out;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast.hide{opacity:0;transform:translateY(-10px)}
.toast.ok{background:#228B22e0;color:#FFF}.toast.er{background:#CC0000e0;color:#FFF}.toast.in{background:#1A1A3Ae0;color:var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

/* ── Narration Bar ── */
.narr{background:#FFF8E8;border-top:3px solid var(--gold-d);display:flex;align-items:center;
  padding:6px 12px;gap:8px;min-height:40px;flex-shrink:0}
.narr .face{min-width:28px;height:24px;border-radius:4px;border:2px solid var(--gold-d);display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:bold;font-family:monospace;
  background:#1A1A3A;color:#44DD66;flex-shrink:0}
.narr .txt{flex:1;font-size:12px;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.narr .cur{color:var(--gold-d);animation:blink .8s step-end infinite;font-size:10px}
@keyframes blink{50%{opacity:0}}

/* ── Bottom Nav ── */
.bnav{display:flex;background:#1A1A3A;border-top:3px solid var(--gold-d);padding-bottom:var(--safe);flex-shrink:0;z-index:20}
.bnav .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:8px 4px;border:none;background:none;font-family:inherit;color:#888;font-size:9px;cursor:pointer;
  transition:all .2s;position:relative;min-height:48px;-webkit-tap-highlight-color:transparent}
.bnav .nb .ico{font-size:18px;transition:transform .2s}
.bnav .nb.active{color:var(--gold)}
.bnav .nb.active .ico{transform:scale(1.15)}
.bnav .nb:active{background:#2A2A5A}
.bnav .nb .badge{position:absolute;top:4px;right:calc(50% - 18px);min-width:16px;height:16px;
  background:var(--err);color:#FFF;font-size:8px;font-weight:bold;border-radius:8px;
  display:none;align-items:center;justify-content:center;padding:0 3px}
.bnav .nb .badge.show{display:flex}

/* ── Panel Overlay (Bottom Sheet) ── */
.panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#00000080;z-index:50;
  opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:auto}
.panel-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg);
  border-radius:16px 16px 0 0;border-top:3px solid var(--gold-d);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,.32,1);
  max-height:85vh;display:flex;flex-direction:column;padding-bottom:var(--safe)}
.panel-overlay.open .panel-sheet{transform:translateY(0)}
.panel-handle{width:36px;height:4px;background:#C8A882;border-radius:2px;margin:8px auto 4px;flex-shrink:0}
.panel-tabs{display:flex;padding:0 8px;gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.panel-tabs::-webkit-scrollbar{display:none}
.ptab{padding:8px 14px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:bold;
  color:#8B7860;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;
  min-height:44px;display:flex;align-items:center;gap:4px}
.ptab.active{color:var(--gold-dd);border-bottom-color:var(--gold-d)}
.ptab:active{background:#D4B89640}
.panel-body{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:#C8A882;border-radius:2px}

/* ── Log Entries ── */
.le{padding:6px 8px;margin-bottom:3px;border-radius:6px;border-left:4px solid #C8A882;background:#FFF8E8;line-height:1.4;
  transition:background .2s}
.le.ok{border-color:var(--ok)}.le.er{border-color:var(--err)}.le.wr{border-color:var(--warn)}.le.in{border-color:var(--info)}
.le .t{color:#8B7860;font-size:9px;margin-right:4px}
.le .n{color:var(--accent);font-weight:bold;margin-right:4px;font-size:11px}
.le .m{color:#4A3A2A;font-size:10px}

/* ── Metric Bars ── */
.sb{display:flex;align-items:center;gap:4px;margin-bottom:4px;min-height:22px}
.sb .n{width:54px;text-align:right;color:var(--gold-dd);font-size:10px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb .b{flex:1;height:14px;background:#444;border:1px solid #222;border-radius:3px;overflow:hidden;position:relative}
.sb .f{height:100%;min-width:1px;border-radius:2px;transition:width .6s ease}
.sb .v{width:32px;text-align:right;font-weight:bold;color:var(--err);font-size:10px}
/* Sparkline in metric bar */
.sb .spark{position:absolute;right:2px;top:1px;height:12px;opacity:.4}

/* ── Agent Cards ── */
.ac{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;background:#FFF8E8;
  border:2px solid #D4B896;border-radius:8px;transition:all .3s;min-height:52px}
.ac.on{background:#FFE8C0;border-color:var(--accent);box-shadow:0 0 8px #CC660030}
.ac .fc{width:36px;height:36px;border-radius:6px;border:2px solid var(--gold-d);display:flex;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .3s}
.ac .i{flex:1;overflow:hidden}
.ac .nm{font-weight:bold;font-size:12px;color:var(--gold-dd)}
.ac .rl{font-size:9px;color:#8B7860;margin-left:4px}
.ac .tk{font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.pw{width:100%;height:6px;background:#444;margin-top:3px;overflow:hidden;border-radius:3px}
.pw .pf{height:100%;border-radius:3px;transition:width .6s ease}

/* ── Command Panel ── */
.cmd-area{padding:4px 0}
.cmd-row{display:flex;gap:6px;margin-bottom:6px}
.cmd-row input{flex:1;padding:10px 12px;background:#FFF8E8;color:var(--text);border:2px solid #C8A882;
  border-radius:8px;font-family:inherit;font-size:13px;min-height:44px}
.cmd-row input:focus{outline:none;border-color:var(--gold-d);box-shadow:0 0 0 3px #8B691430}
.cmd-row button{padding:10px 18px;background:linear-gradient(#FFE0A0,#FFC860);color:var(--gold-dd);
  border:2px solid var(--gold-d);border-radius:8px;font-family:inherit;font-size:13px;font-weight:bold;
  cursor:pointer;box-shadow:2px 2px 0 var(--gold-dd);min-height:44px;min-width:60px;
  transition:all .15s;active:transform:translateY(1px)}
.cmd-row button:active{transform:translateY(2px);box-shadow:0 0 0 var(--gold-dd)}
.quick-cmds{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.qc{padding:8px 14px;background:#FFF8E8;border:2px solid #D4B896;border-radius:8px;font-size:11px;
  cursor:pointer;font-family:inherit;color:var(--gold-dd);font-weight:bold;min-height:36px;
  transition:all .15s;display:flex;align-items:center;gap:4px}
.qc:active{background:#FFE8C0;border-color:var(--accent);transform:scale(.95)}
.cmd-hist{max-height:50vh;overflow-y:auto}
.cmd-entry{padding:6px 8px;margin-bottom:3px;border-radius:6px;border-left:4px solid var(--info);background:#FFF8E8;font-size:11px}
.cmd-entry .ct{color:var(--accent);font-weight:bold}
.cmd-entry .cs{font-size:9px;margin-left:4px}
.cmd-entry .cs.queued{color:var(--ok)}.cmd-entry .cs.rejected{color:var(--err)}.cmd-entry .cs.pending{color:var(--warn)}

/* ── FAB (Floating Action Button) ── */
.fab{position:fixed;bottom:calc(60px + var(--safe));right:12px;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#FFE0A0,#FFC860);border:3px solid var(--gold-d);
  box-shadow:0 4px 12px #00000040,2px 2px 0 var(--gold-dd);color:var(--gold-dd);font-size:22px;
  cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;
  transition:all .2s;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.9)}
.fab.hide{transform:scale(0);opacity:0;pointer-events:none}

/* ── Setup Overlay ── */
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1A1A3Af0;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px}
.setup-box{background:var(--panel);border:3px solid var(--gold-d);border-radius:12px;
  box-shadow:4px 4px 0 var(--gold-dd);padding:24px;max-width:380px;width:100%}
.setup-box h2{color:var(--gold-dd);font-size:16px;margin-bottom:16px;text-align:center}
.setup-box label{display:block;font-size:11px;color:#8B7860;margin:12px 0 4px;font-weight:bold}
.setup-box input{width:100%;padding:10px 12px;background:#FFF8E8;color:var(--text);border:2px solid #C8A882;
  border-radius:8px;font-family:inherit;font-size:12px;min-height:44px}
.setup-box input:focus{outline:none;border-color:var(--gold-d)}
.setup-box button{width:100%;padding:14px;margin-top:20px;background:linear-gradient(#FFE0A0,#FFC860);
  color:var(--gold-dd);border:2px solid var(--gold-d);border-radius:8px;font-family:inherit;font-size:14px;
  font-weight:bold;cursor:pointer;box-shadow:2px 2px 0 var(--gold-dd);min-height:48px}
.setup-box button:active{transform:translateY(2px);box-shadow:none}
.setup-box .hint{font-size:9px;color:#8B7860;margin-top:10px;text-align:center}

/* ── Skeleton Loading ── */
.skel{background:linear-gradient(90deg,#E8D8C0 25%,#F0E8D4 50%,#E8D8C0 75%);background-size:200%;
  animation:shimmer 1.5s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* ── Desktop Override ── */
@media(min-width:768px){
  .fab{bottom:calc(60px + var(--safe));right:24px;width:56px;height:56px;font-size:24px}
  .panel-sheet{max-width:600px;margin:0 auto;left:50%;right:auto;transform:translateX(-50%) translateY(100%);width:100%}
  .panel-overlay.open .panel-sheet{transform:translateX(-50%) translateY(0)}
}
/* ── Landscape ── */
@media(max-height:400px) and (orientation:landscape){
  .narr{display:none}
  .bnav .nb{padding:4px;min-height:40px}
  .bnav .nb .ico{font-size:16px}
  .bnav .nb span:last-child{display:none}
}
</style>
</head>
<body>
<!-- Setup Overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>에이전트 개발국 ++ Remote</h2>
    <label>Supabase URL</label>
    <input id="cfgUrl" placeholder="https://xxxx.supabase.co" autocomplete="off">
    <label>Anon Key</label>
    <input id="cfgKey" placeholder="eyJhbGci..." autocomplete="off">
    <label>Session ID</label>
    <input id="cfgSession" placeholder="relay 시작 시 표시된 Session ID">
    <button onclick="doConnect()">접속</button>
    <div class="hint">설정은 localStorage에 저장됩니다. URL 파라미터로도 전달 가능.</div>
  </div>
</div>

<!-- Main App -->
<div class="app" id="mainApp" style="display:none">
<!-- Top Bar -->
<div class="top">
  <div class="live off" id="lv"></div>
  <div class="logo">개발국 <span class="sub">Remote</span></div>
  <div class="stats">
    <div class="stat"><b id="sT">0</b>작업</div>
    <div class="stat"><b id="sA">0</b><span class="delta" id="sAd"></span>승인</div>
    <div class="stat"><b id="sD">0</b>차단</div>
    <div class="stat"><b id="sO">-</b>ops/m</div>
  </div>
</div>

<!-- Scene -->
<div class="scene">
  <canvas id="c"></canvas>
  <div class="conn off" id="cs">연결 대기<span class="signal" id="sig"><i></i><i></i><i></i><i></i></span></div>
  <div class="toast-wrap" id="toastWrap"></div>
</div>

<!-- Narration -->
<div class="narr">
  <div class="face" id="nf">SYS</div>
  <div class="txt" id="nt">에이전트 개발국 Remote에 오신 것을 환영합니다!</div>
  <div class="cur">▼</div>
</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <button class="nb active" data-p="log" onclick="openPanel('log')">
    <span class="ico">📜</span><span>로그</span><span class="badge" id="logBadge">0</span>
  </button>
  <button class="nb" data-p="metrics" onclick="openPanel('metrics')">
    <span class="ico">📊</span><span>메트릭</span>
  </button>
  <button class="nb" data-p="agents" onclick="openPanel('agents')">
    <span class="ico">👥</span><span>직원</span>
  </button>
  <button class="nb" data-p="cmd" onclick="openPanel('cmd')">
    <span class="ico">💬</span><span>명령</span><span class="badge" id="cmdBadge">0</span>
  </button>
</nav>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openPanel('cmd')">💬</button>

<!-- Panel Bottom Sheet -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel(event)">
  <div class="panel-sheet" id="panelSheet">
    <div class="panel-handle"></div>
    <div class="panel-tabs">
      <button class="ptab active" data-p="log" onclick="switchTab('log')">📜 활동 로그 <span id="lc" style="color:var(--accent)">0</span></button>
      <button class="ptab" data-p="metrics" onclick="switchTab('metrics')">📊 메트릭스 <span id="mc"></span></button>
      <button class="ptab" data-p="agents" onclick="switchTab('agents')">👥 직원 8</button>
      <button class="ptab" data-p="cmd" onclick="switchTab('cmd')">💬 명령 <span id="cmdCount">0</span></button>
    </div>
    <div class="panel-body" id="panelBody">
      <!-- Content injected by JS -->
      <div class="skel" style="height:20px;margin-bottom:6px"></div>
      <div class="skel" style="height:20px;margin-bottom:6px;width:80%"></div>
      <div class="skel" style="height:20px;width:60%"></div>
    </div>
  </div>
</div>

<script>
// ── Debug ──
window.onerror=function(msg,src,line){console.error('JS Error:',msg,'line:',line)};

// ── Supabase State ──
let sbClient=null, channel=null;

// ── State ──
const P=window.innerWidth<=600?3:5;
let serverMetrics=null, timeline=[], prevTotal=0;
const TK={Bash:'터미널',Read:'파일읽기',Write:'파일쓰기',Edit:'코드편집',Grep:'패턴검색',Glob:'파일찾기',WebSearch:'웹검색',WebFetch:'웹수집',Task:'서브에이전트',Skill:'스킬',NotebookEdit:'노트북',TaskCreate:'태스크생성',TaskUpdate:'태스크갱신',TaskList:'태스크목록',TaskGet:'태스크조회',TaskOutput:'결과확인',TaskStop:'태스크중단',ToolSearch:'도구탐색',AskUserQuestion:'질의'};
function tk(t){if(!t)return'대기';if(TK[t])return TK[t];if(t.startsWith('mcp__serena__'))return'Serena';if(t.startsWith('mcp__memory__'))return'메모리';if(t.startsWith('mcp__context7'))return'문서조회';if(t.startsWith('mcp__filesystem'))return'파일시스템';if(t.startsWith('mcp__grep'))return'코드검색';if(t.startsWith('mcp__seq'))return'추론';if(t.startsWith('mcp__'))return'MCP';return t}

// ── Toast System ──
function toast(msg,type='in'){
  const wrap=document.getElementById('toastWrap');if(!wrap)return;
  const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;
  wrap.appendChild(el);requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');el.classList.add('hide');setTimeout(()=>el.remove(),300)},2500);
  while(wrap.children.length>3)wrap.firstChild.remove();
}

// ── Panel System ──
let currentPanel='log', panelOpen=false, newLogCount=0;
function openPanel(name){
  currentPanel=name||'log';panelOpen=true;
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('fabBtn').classList.add('hide');
  switchTab(currentPanel);renderPanel();
  document.querySelectorAll('.bnav .nb').forEach(b=>{b.classList.toggle('active',b.dataset.p===currentPanel)});
  if(name==='log'){newLogCount=0;updateBadge('logBadge',0)}
}
function closePanel(e){if(e&&e.target!==e.currentTarget)return;
  panelOpen=false;document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('fabBtn').classList.remove('hide');
}
function switchTab(name){
  currentPanel=name;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.p===name));
  document.querySelectorAll('.bnav .nb').forEach(b=>b.classList.toggle('active',b.dataset.p===name));
  renderPanel();
}
function updateBadge(id,n){const el=document.getElementById(id);if(!el)return;

// ── Sparkline ──
const sparkData={ops:[],errs:[]};
function addSpark(key,val){const a=sparkData[key];a.push(val);if(a.length>20)a.shift()}
function drawSparkSvg(data,color,w,h){
  if(data.length<2)return'';
  const max=Math.max(1,...data),pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-v/max*(h-2)+1}`).join(' ');
  return`<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
}

// ── KAIROSOFT-STYLE CHARACTER (chibi: big head, small body) ──
// ══════════════════════════════════════════════════════
function drawCh(px,py,type,wf,dir,work,bub,ag){
  const c=C[type]||C.agent, s=P;
  const OL='#1A1A0A',SK='#FFD8B0',SK2='#EEBB88';
  const idle=ag&&ag.st==='idle', mood=ag?ag.mood:0;

  if(work){
    const bob=Math.sin(fr*.15)*.5;
    const y=py+bob;
    const tL=Math.sin(fr*.5)*1, tR=Math.sin(fr*.5+3.14)*1;
    cx.fillStyle=c.s;
    cx.fillRect(px-5*s,y+3*s+tL,2*s,2.5*s);
    cx.fillRect(px+3*s,y+3*s+tR,2*s,2.5*s);
    cx.fillStyle=SK;
    cx.fillRect(px-5*s,y+5*s+tL,2*s,s);
    cx.fillRect(px+3*s,y+5*s+tR,2*s,s);
    cx.fillStyle=OL;cx.fillRect(px-4*s-1,y+1.5*s-1,8*s+2,4*s+2);
    cx.fillStyle=c.s;cx.fillRect(px-4*s,y+1.5*s,8*s,4*s);
    cx.fillStyle='#FFF';cx.fillRect(px-1.5*s,y+1.5*s,3*s,s);
    cx.fillStyle=OL;cx.fillRect(px-5*s-1,y-5.5*s-1,10*s+2,7*s+2);
    cx.fillStyle=SK;cx.fillRect(px-5*s,y-5.5*s,10*s,7*s);
    cx.fillStyle='#FFAA8840';
    cx.fillRect(px-4.5*s,y-1*s,2*s,1.5*s);
    cx.fillRect(px+2.5*s,y-1*s,2*s,1.5*s);
    cx.fillStyle=OL;cx.fillRect(px-5.5*s-1,y-7*s-1,11*s+2,3.5*s+2);
    cx.fillStyle=c.h;cx.fillRect(px-5.5*s,y-7*s,11*s,3.5*s);
    cx.fillRect(px-5.5*s,y-4*s,2*s,2.5*s);
    cx.fillRect(px+3.5*s,y-4*s,2*s,2.5*s);
    if(fr%100<97){
      cx.fillStyle='#FFF';
      cx.fillRect(px-3.5*s,y-3.5*s,3*s,2.5*s);
      cx.fillRect(px+.5*s,y-3.5*s,3*s,2.5*s);
      cx.fillStyle='#000';
      cx.fillRect(px-2.5*s,y-3*s,1.8*s,1.8*s);
      cx.fillRect(px+1.2*s,y-3*s,1.8*s,1.8*s);
      cx.fillStyle='#FFF';
      cx.fillRect(px-2.2*s,y-3*s,s*.6,s*.6);
      cx.fillRect(px+1.5*s,y-3*s,s*.6,s*.6);
    }else{
      cx.fillStyle='#000';
      cx.fillRect(px-3.5*s,y-2.5*s,3*s,s*.5);
      cx.fillRect(px+.5*s,y-2.5*s,3*s,s*.5);
    }
    cx.fillStyle='#CC6644';
    cx.fillRect(px-s*.5,y,fr%60<10?2*s:s,s*.5);
    drawAccessory(px,y,type,s,true);
    if(ag&&ag.wt>60){
      const sw=((fr*2)%25);
      cx.globalAlpha=1-sw/25;
      cx.fillStyle='#88CCFF';
      cx.fillRect(px+5*s,y-5*s+sw*.5,s*.5,s*.8);
      cx.globalAlpha=1;
    }
    drawWorkFx(px,y,type,s);
    drawStatusIcon(px+6.5*s,y-7*s,'gear');
    if(bub) drawBub(px,y-9*s,bub);
    drawNameTag(px,py+8*s,c);
    return;
  }

  // ═══ STANDING / WALKING ═══
  const bounce=Math.sin(wf*.3)*1;
  const y=py+bounce;
  const walk=ag&&ag.st==='walk';
  const step=walk?Math.sin(wf*.35)*2:Math.sin(wf*.08)*.5;
  cx.fillStyle='#00000020';
  cx.fillRect(px-4*s,y+8.5*s,8*s,1.5*s);
  cx.fillStyle=OL;
  cx.fillRect(px-2.5*s,y+7*s+(step>0?-s*.5:0),2*s,2*s);
  cx.fillRect(px+.5*s,y+7*s+(step<0?-s*.5:0),2*s,2*s);
  cx.fillStyle=c.p;
  cx.fillRect(px-2.3*s,y+7.2*s+(step>0?-s*.5:0),1.6*s,1.5*s);
  cx.fillRect(px+.7*s,y+7.2*s+(step<0?-s*.5:0),1.6*s,1.5*s);
  cx.fillStyle=OL;cx.fillRect(px-2.5*s-1,y+5.5*s-1,5*s+2,2*s+2);
  cx.fillStyle=c.p;cx.fillRect(px-2.5*s,y+5.5*s,5*s,2*s);
  cx.fillStyle=OL;cx.fillRect(px-3.5*s-1,y+2*s-1,7*s+2,4*s+2);
  cx.fillStyle=c.s;cx.fillRect(px-3.5*s,y+2*s,7*s,4*s);
  cx.fillStyle='#FFF';cx.fillRect(px-1.2*s,y+2*s,2.4*s,s*.8);
  let armL=step*.3, armR=-step*.3;
  if(idle&&mood===1){armL=-2;armR=-2}
  if(idle&&mood===3){armR=-3}
  cx.fillStyle=OL;
  cx.fillRect(px-4.5*s-1,y+2.5*s+armL-1,1.5*s+2,3.5*s+2);
  cx.fillRect(px+3*s-1,y+2.5*s+armR-1,1.5*s+2,3.5*s+2);
  cx.fillStyle=c.s;
  cx.fillRect(px-4.5*s,y+2.5*s+armL,1.5*s,3.5*s);
  cx.fillRect(px+3*s,y+2.5*s+armR,1.5*s,3.5*s);
  cx.fillStyle=SK;
  cx.fillRect(px-4.5*s,y+5.5*s+armL,1.5*s,1.2*s);
  cx.fillRect(px+3*s,y+5.5*s+armR,1.5*s,1.2*s);
  if(idle&&mood===3){
    cx.fillStyle='#FFF';cx.fillRect(px+3.5*s,y+2*s+armR,2*s,2.5*s);
    cx.fillStyle='#8B6914';cx.fillRect(px+3.5*s,y+2*s+armR,2*s,.4*s);
    cx.fillStyle='#6B3A1A';cx.fillRect(px+3.7*s,y+2.4*s+armR,1.6*s,1.6*s);
    if(fr%40<25){cx.globalAlpha=.4;cx.fillStyle='#FFF';
      cx.fillRect(px+4*s,y+1.2*s+armR-Math.sin(fr*.1)*s,s*.4,s*.7);
      cx.fillRect(px+4.5*s,y+.8*s+armR-Math.cos(fr*.12)*s,s*.3,s*.5);
      cx.globalAlpha=1}
  }
  let headOff=0;
  if(idle&&mood===2)headOff=Math.sin(fr*.04)*2;
  cx.fillStyle=OL;cx.fillRect(px-5*s-1+headOff,y-5*s-1,10*s+2,7*s+2);
  cx.fillStyle=SK;cx.fillRect(px-5*s+headOff,y-5*s,10*s,7*s);
  cx.fillStyle='#FFAA8840';
  cx.fillRect(px-4.5*s+headOff,y-.5*s,2*s,1.5*s);
  cx.fillRect(px+2.5*s+headOff,y-.5*s,2*s,1.5*s);
  cx.fillStyle=OL;cx.fillRect(px-5.5*s-1+headOff,y-6.5*s-1,11*s+2,3.5*s+2);
  cx.fillStyle=c.h;cx.fillRect(px-5.5*s+headOff,y-6.5*s,11*s,3.5*s);
  cx.fillRect(px-5.5*s+headOff,y-3.5*s,2*s,2.5*s);
  cx.fillRect(px+3.5*s+headOff,y-3.5*s,2*s,2.5*s);
  const blk=fr%180>=176;
  if(!blk&&!(idle&&mood===4)){
    const ex=dir>0?s*.3:dir<0?-s*.3:0;
    cx.fillStyle='#FFF';
    cx.fillRect(px-3.5*s+headOff,y-3*s,3*s,2.5*s);
    cx.fillRect(px+.5*s+headOff,y-3*s,3*s,2.5*s);
    cx.fillStyle='#222';
    cx.fillRect(px-2.5*s+ex+headOff,y-2.5*s,1.8*s,1.8*s);
    cx.fillRect(px+1.2*s+ex+headOff,y-2.5*s,1.8*s,1.8*s);
    cx.fillStyle='#FFF';
    cx.fillRect(px-2.2*s+ex+headOff,y-2.5*s,s*.6,s*.6);
    cx.fillRect(px+1.5*s+ex+headOff,y-2.5*s,s*.6,s*.6);
  }else if(idle&&mood===4){
    cx.fillStyle='#FFF';
    cx.fillRect(px-3.5*s+headOff,y-2.5*s,3*s,1.2*s);
    cx.fillRect(px+.5*s+headOff,y-2.5*s,3*s,1.2*s);
    cx.fillStyle='#222';
    cx.fillRect(px-2.5*s+headOff,y-2*s,1.5*s,s*.8);
    cx.fillRect(px+1.2*s+headOff,y-2*s,1.5*s,s*.8);
  }else{
    cx.fillStyle='#222';
    cx.fillRect(px-3*s+headOff,y-1.8*s,2.5*s,s*.4);
    cx.fillRect(px+.5*s+headOff,y-1.8*s,2.5*s,s*.4);
  }
  cx.fillStyle='#CC6644';
  if(idle&&mood===4){cx.fillRect(px-.5*s+headOff,y+.5*s,s*1.2,s*.8)}
  else if(idle&&mood===1){cx.fillRect(px-s+headOff,y+.5*s,2*s,s*.3);cx.fillRect(px-.5*s+headOff,y+.7*s,s,s*.2)}
  else if(walk){cx.fillRect(px-.3*s+headOff,y+.5*s,s*.6,s*.4)}
  else{cx.fillRect(px-.5*s+headOff,y+.5*s,s,s*.4)}
  drawAccessory(px+headOff,y,type,s,false);
  if(idle){
    if(mood===4) drawStatusIcon(px+6*s,y-7*s,'zzz');
    else if(mood===0) drawStatusIcon(px+6*s,y-7*s,'idle');
  }
  if(ag&&ag.compFx>0){
    cx.globalAlpha=ag.compFx/20;
    cx.fillStyle='#FFD080';
    cx.fillRect(px-6*s,y-7*s,12*s,16*s);
    cx.globalAlpha=1;
  }
  drawNameTag(px,y+9*s,c);
}

// ── Agent accessories ──
function drawAccessory(px,y,type,s,sitting){
  switch(type){
    case 'bash':
      cx.fillStyle='#333';
      cx.fillRect(px-5.8*s,y-4*s,1.2*s,3*s);
      cx.fillRect(px+4.6*s,y-4*s,1.2*s,3*s);
      cx.fillStyle='#555';
      cx.fillRect(px-4*s,y-7.5*s,8*s,s*.8);
      break;
    case 'reader':
      cx.fillStyle='#8B6914';
      cx.fillRect(px-4*s,y-3.2*s,3.2*s,s*.4);
      cx.fillRect(px+.8*s,y-3.2*s,3.2*s,s*.4);
      cx.fillRect(px-4*s,y-3.2*s,s*.3,2.5*s);cx.fillRect(px-.8*s,y-3.2*s,s*.3,2.5*s);
      cx.fillRect(px+.8*s,y-3.2*s,s*.3,2.5*s);cx.fillRect(px+3.7*s,y-3.2*s,s*.3,2.5*s);
      cx.fillRect(px-.8*s,y-2.5*s,1.6*s,s*.3);
      break;
    case 'writer':
      cx.fillStyle='#CC2244';
      cx.fillRect(px-5*s,y-7.5*s,10*s,2*s);
      cx.fillStyle='#FF4466';
      cx.fillRect(px-5*s,y-7.5*s,10*s,s*.6);
      cx.fillRect(px-s*.5,y-8*s,s,s);
      break;
    case 'finder':
      cx.fillStyle='#556B2F';
      cx.fillRect(px-5.5*s,y-7*s,11*s,1.5*s);
      cx.fillRect(px-6*s,y-5.8*s,3*s,s);
      break;
    case 'mcp':
      cx.fillStyle='#44DDAA';
      cx.fillRect(px-.2*s,y-8.5*s,s*.4,2*s);
      cx.fillStyle='#00FF88';
      cx.fillRect(px-.5*s,y-9*s,s,s);
      if(fr%30<15){cx.fillStyle='#00FF8860';cx.fillRect(px-s,y-9.5*s,2*s,2*s)}
      break;
    case 'agent':
      if(!sitting){
        cx.fillStyle='#CC3300';
        cx.fillRect(px-.5*s,y+2.8*s,s,2.5*s);
        cx.fillRect(px-.8*s,y+2.5*s,1.6*s,s*.6);
      }
      break;
    case 'web':
      cx.fillStyle='#333';
      cx.fillRect(px-5.8*s,y-4*s,1.2*s,2.5*s);
      cx.fillStyle='#444';
      cx.fillRect(px-6.5*s,y-2*s,2*s,1.5*s);
      cx.fillRect(px-6.5*s,y-2*s,s*.3,2*s);
      break;
    case 'serena':
      cx.fillStyle='#FFD700';
      cx.fillRect(px+3*s,y-6*s,2.5*s,1.5*s);
      cx.fillStyle='#FFA500';
      cx.fillRect(px+3.8*s,y-6*s,s*.8,1.5*s);
      break;
  }
}

function drawNameTag(px,y,c){
  const nm=c.l, nw=nm.length*14+14;
  cx.font='bold 14px "Malgun Gothic",sans-serif';cx.textAlign='center';
  cx.fillStyle='#000';cx.fillRect(px-nw/2-2,y-1,nw+4,20);
  cx.fillStyle=c.p;cx.fillRect(px-nw/2,y,nw,18);
  cx.fillStyle='#FFD080';cx.fillRect(px-nw/2,y,nw,2);cx.fillRect(px-nw/2,y+16,nw,2);
  cx.fillStyle='#000';cx.fillText(nm,px+1,y+14);
  cx.fillStyle='#FFF';cx.fillText(nm,px,y+13);
}

// ── Work effects ──
function drawWorkFx(px,y,type,s){
  cx.font='bold 9px monospace';cx.textAlign='center';
  const phase=fr*.12;
  switch(type){
    case 'bash':
      ['$_','>_','OK','#!','~~'].forEach((ch,i)=>{
        const fy=((fr*2+i*25)%70);cx.globalAlpha=1-fy/70;
        cx.fillStyle='#44DD66';
        cx.fillText(ch,px+(Math.sin(i*2.1)*3-1)*s,y-8*s-fy*.4);
      });break;
    case 'reader':
      for(let i=0;i<2;i++){
        const fy=((fr*1.5+i*40)%60);cx.globalAlpha=.8-fy/75;
        cx.fillStyle='#FFF';cx.fillRect(px+(i*2-1)*5*s,y-9*s-fy*.3,3*s,3.5*s);
        cx.fillStyle='#6688CC';
        for(let j=0;j<3;j++)cx.fillRect(px+(i*2-1)*5*s+s*.3,y-8.5*s+j*s-fy*.3,2.2*s,s*.25);
      }break;
    case 'writer':
      ['</>','{;}','fn(','//!','==='].forEach((ch,i)=>{
        const fy=((fr*2.2+i*20)%65);cx.globalAlpha=1-fy/65;
        cx.fillStyle=['#FF6699','#FFAA22','#88BBFF','#44DD66','#CC88FF'][i];
        cx.fillText(ch,px+(Math.sin(i*1.7)*3.5)*s,y-8*s-fy*.35);
      });break;
    case 'finder':
      ['??','>>','**','..','!!'].forEach((ch,i)=>{
        const fy=((fr*1.8+i*22)%60);cx.globalAlpha=1-fy/60;
        cx.fillStyle='#44AA88';
        cx.fillText(ch,px+(Math.cos(i*1.4)*3)*s,y-8*s-fy*.35);
      });break;
    case 'mcp':
      for(let i=0;i<4;i++){
        const ang=phase+i*Math.PI/2,r=(3+Math.sin(fr*.08+i)*1.5)*s;
        cx.globalAlpha=.5+Math.sin(fr*.1+i)*.3;
        cx.fillStyle='#44DDAA';
        cx.fillRect(px+Math.cos(ang)*r-s*.4,y-8*s+Math.sin(ang)*r-s*.4,s*.8,s*.8);
      }
      cx.globalAlpha=1;cx.fillStyle='#00FF88';cx.fillRect(px-s*.5,y-8.5*s,s,s);
      break;
    case 'agent':
      ['>>','>>','>>'].forEach((_,i)=>{
        const fx=((fr*3+i*30)%80)-40;cx.globalAlpha=1-Math.abs(fx)/40;
        cx.fillStyle='#AA88FF';
        cx.fillRect(px+fx*.5,y-8*s-i*2*s,s*1.5,s*.8);
      });break;
    case 'web':
      ['@','://','GET','200','www'].forEach((ch,i)=>{
        const fy=((fr*2+i*18)%55);cx.globalAlpha=1-fy/55;
        cx.fillStyle='#FF88AA';
        cx.fillText(ch,px+(Math.sin(i*2.3)*3)*s,y-8*s-fy*.35);
      });break;
    case 'serena':
      cx.fillStyle='#B8860B';cx.globalAlpha=.7;
      cx.fillRect(px-s*.3,y-11*s,s*.6,4*s);
      [[-2,-2],[2,-2.5],[-1.5,-3.5],[1.5,-4],[0,-5]].forEach(([bx,by],i)=>{
        cx.fillStyle=['#44AA44','#228B22','#66CC66','#44AA44','#88DD88'][i];
        cx.globalAlpha=.5+Math.sin(fr*.06+i)*.3;
        cx.fillRect(px+bx*s,y-11*s+by*s,s*1.2,s*1.2);
      });break;
  }
  cx.globalAlpha=1;
}

function drawStatusIcon(x,y,type){
  if(type==='gear'){
    const gfr=fr*.08;
    cx.fillStyle='#FFD080';
    for(let i=0;i<6;i++){
      const a=gfr+i*Math.PI/3,r=3.5;
      cx.fillRect(x+Math.cos(a)*r-1.5,y+Math.sin(a)*r-1.5,3,3);
    }
    cx.fillStyle='#8B6914';cx.fillRect(x-2,y-2,4,4);
  }else if(type==='zzz'){
    cx.font='bold 10px monospace';cx.textAlign='left';
    const z=((fr>>4)%3);
    cx.globalAlpha=.6;cx.fillStyle='#8888CC';
    if(z>=0)cx.fillText('z',x,y);
    if(z>=1)cx.fillText('z',x+5,y-6);
    if(z>=2)cx.fillText('Z',x+9,y-13);
    cx.globalAlpha=1;
  }else if(type==='idle'){
    cx.fillStyle='#AAAAAA';
    const dp=(fr>>3)%4;
    for(let i=0;i<3;i++){cx.globalAlpha=i<=dp?.6:.15;cx.fillRect(x+i*4,y,2,2)}
    cx.globalAlpha=1;
  }
}

function drawBub(x,y,t){
  const d=t.length>12?t.slice(0,12)+'…':t;
  const w=Math.min(d.length*12+18,200), h=28;
  cx.fillStyle='#5A400880';cx.fillRect(x-w/2+2,y-h+2,w,h);
  cx.fillStyle='#FFF8E8';cx.fillRect(x-w/2,y-h,w,h);
  cx.strokeStyle='#8B6914';cx.lineWidth=2;cx.strokeRect(x-w/2,y-h,w,h);

// ── AGENTS ──
class Ag{
  constructor(t,i){this.t=t;this.i=i;this.x=DESKS[i].x+(Math.random()-.5)*.02;this.y=.78;this.tx=this.x;this.ty=this.y;
    this.d=1;this.st='idle';this.wf=Math.random()*100;this.tk='';this.wt=0;this.di=-1;
    this.xp=0;this.lv=1;this.pw=100;this.tot=0;
    this.mood=0;this.moodTimer=60+Math.random()*120;
    this.compFx=0}
  go(tk){
    this.di=this.i;const d=DESKS[this.i];
    this.tx=d.x+(Math.random()-.5)*.02;this.ty=.48;
    this.st='walk';this.tk=tk;this.wt=60+Math.random()*80;
    this.tot++;this.pw=Math.max(0,this.pw-5);
    this.mood=0;
    this.xp+=8+Math.floor(Math.random()*7);
    if(this.xp>=this.lv*80){this.xp-=this.lv*80;this.lv++;
      narr(C[this.t].l+' Lv.'+this.lv+' 레벨업!',this.t);
      spawnP(d.x*cW(),cH()*.55,8)}
    DESKS[this.i].act=true;
  }
  up(){
    if(this.compFx>0)this.compFx--;
    if(this.st==='walk'){
      const dx=this.tx-this.x,dy=this.ty-this.y;
      if(Math.hypot(dx,dy)>.004){this.x+=dx*.06;this.y+=dy*.06;this.d=dx>0?1:-1;this.wf++}
      else{this.st=this.di>=0?'work':'idle';this.d=1}
    }else if(this.st==='work'){
      this.wt--;
      if(this.wt<=0){
        DESKS[this.i].act=false;this.tk='';
        this.compFx=20;
        spawnP(DESKS[this.i].x*cW(),cH()*.55,5);
        this.tx=DESKS[this.i].x+(Math.random()-.5)*.03;this.ty=.78+Math.random()*.03;
        this.st='walk';this.di=-1;this.pw=Math.min(100,this.pw+3)}
    }else{
      this.pw=Math.min(100,this.pw+.02);
      this.moodTimer--;
      if(this.moodTimer<=0){
        this.mood=(this.mood+1)%5;
        this.moodTimer=80+Math.random()*160;
      }
      if(Math.random()<.003){this.tx=DESKS[this.i].x+(Math.random()-.5)*.04;
        this.ty=Math.max(.73,Math.min(.84,this.y+(Math.random()-.5)*.03));this.st='walk'}
    }
  }
  draw(w,h){drawCh(this.x*w,this.y*h,this.t,this.wf,this.d,this.st==='work',this.st==='work'?this.tk:'',this)}
}

let pts=[];
function spawnP(x,y,n,type){
  if(pts.length>60)return;
  const colors=type==='error'?['#FF3300','#FF6644','#CC0000']:
    type==='success'?['#44DD66','#88FF88','#22AA44']:
    ['#FFD080','#FFAA22','#FF6644','#FFDD44','#88BBFF'];
  for(let i=0;i<Math.min(n,8);i++){
    const shape=Math.random()>.7?'star':'rect';
    pts.push({x:x+(Math.random()-.5)*10,y:y+(Math.random()-.5)*5,
      vx:(Math.random()-.5)*4,vy:-Math.random()*4-1,
      l:30+Math.random()*20,c:colors[i%colors.length],
      z:2+Math.random()*3,shape,rot:Math.random()*6.28,rv:(Math.random()-.5)*.2});
  }
}
function drawPts(){pts=pts.filter(p=>{
  p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.vx*=.99;p.l--;p.rot+=p.rv;
  if(p.l<=0)return false;
  cx.globalAlpha=Math.min(p.l/25,1);cx.fillStyle=p.c;
  if(p.shape==='star'){
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);
    cx.fillRect(-p.z/2,-p.z*.15,p.z,p.z*.3);
    cx.fillRect(-p.z*.15,-p.z/2,p.z*.3,p.z);
    cx.restore();
  }else{
    cx.fillRect(p.x,p.y,p.z,p.z);
  }
  cx.globalAlpha=1;return true;
})}

function pick(a){return a[Math.floor(Math.random()*a.length)]}

// ── WEATHER & DAY/NIGHT SYSTEM ──
let weatherParticles=[];
function getWeather(){
  // Error rate determines weather: sunny(good) -> cloudy -> rain(bad)
  if(entries.length<5)return'sunny';
  const recent=entries.slice(-20);
  const errRate=recent.filter(e=>e.err||e.decision==='deny').length/recent.length;
  if(errRate>.3)return'rain';if(errRate>.1)return'cloudy';return'sunny';
}
function getDayPhase(){
  const h=new Date().getHours();
  if(h>=6&&h<10)return'morning';if(h>=10&&h<17)return'day';
  if(h>=17&&h<20)return'evening';return'night';
}
function drawWeather(w,h){
  const weather=getWeather(),phase=getDayPhase();
  // Day/night tint overlay
  if(phase==='evening'){cx.fillStyle='#FF880008';cx.fillRect(0,0,w,h)}
  else if(phase==='night'){cx.fillStyle='#0000220A';cx.fillRect(0,0,w,h)}
  else if(phase==='morning'){cx.fillStyle='#FFE8B005';cx.fillRect(0,0,w,h)}
  // Weather effects
  if(weather==='rain'){
    for(let i=0;i<3;i++){
      weatherParticles.push({x:Math.random()*w,y:-5,vx:-.5,vy:4+Math.random()*3,l:h/4+Math.random()*20,type:'rain'});
    }
  }else if(weather==='sunny'&&Math.random()<.02){
    weatherParticles.push({x:Math.random()*w,y:Math.random()*h*.3,vx:0,vy:0,l:40+Math.random()*30,type:'sparkle',r:Math.random()*6.28});
  }
  weatherParticles=weatherParticles.filter(p=>{
    p.x+=p.vx||0;p.y+=p.vy||0;p.l--;
    if(p.l<=0||p.y>h)return false;
    if(p.type==='rain'){
      cx.globalAlpha=.25;cx.fillStyle='#6688CC';
      cx.fillRect(p.x,p.y,1,6);cx.globalAlpha=1;
    }else if(p.type==='sparkle'){
      p.r+=.05;cx.globalAlpha=Math.min(p.l/20,.4);cx.fillStyle='#FFE8B0';
      cx.fillRect(p.x+Math.cos(p.r)*2-1,p.y-1,2,2);
      cx.fillRect(p.x-1,p.y+Math.sin(p.r)*2-1,2,2);
      cx.globalAlpha=1;
    }
    return true;
  });
}

// ── Screen shake on deny ──
let shakeFrames=0, shakeIntensity=0;
function triggerShake(intensity){shakeFrames=12;shakeIntensity=intensity||3}

// ── RENDER (30fps) ──
let lastRender=0,hudPrev=0,hudWait=30,hudShow=0;
function render(ts){
  requestAnimationFrame(render);
  if(ts-lastRender<33)return;
  lastRender=ts;
  const w=cW(),h=cH();
  if(!bg||bgW!==w||bgH!==h)buildBg(w,h);
  // Screen shake
  let sx=0,sy=0;
  if(shakeFrames>0){sx=(Math.random()-.5)*shakeIntensity;sy=(Math.random()-.5)*shakeIntensity;shakeFrames--}
  cx.save();cx.translate(sx,sy);
  cx.drawImage(bg,0,0,bg.width,bg.height,0,0,w,h);
  drawWeather(w,h);
  const fy=h*.55;
  DESKS.forEach((d,i)=>{if(d.act)drawActiveScreen(d.x*w,fy,AT[i])});
  agents.forEach(a=>a.up());
  agents.sort((a,b)=>a.y-b.y);
  agents.forEach(a=>a.draw(w,h));
  drawPts();
  // HUD overlay
  let ac=0;agents.forEach(a=>{if(a.st==='work')ac++});
  if(ac!==hudPrev){hudWait=0;hudPrev=ac}else if(hudWait<31)hudWait++;
  if(hudWait>=30)hudShow=hudPrev;
  const hudW=serverMetrics&&serverMetrics.opsPerMin?210:130;
  cx.fillStyle='#000000AA';cx.fillRect(4,4,hudW,26);
  cx.fillStyle='#1A1A3A';cx.fillRect(5,5,hudW-2,24);
  cx.fillStyle='#8B6914';cx.fillRect(5,5,hudW-2,2);cx.fillRect(5,27,hudW-2,2);
  cx.font='bold 14px "Malgun Gothic",sans-serif';cx.textAlign='left';
  if(hudShow>0){
    cx.fillStyle='#FF6644';cx.fillRect(10,11,14,14);
    cx.fillStyle='#FFD080';cx.fillText(hudShow+'명 개발 중',28,23);
  }else{
    cx.fillStyle='#88AACC';cx.fillText('대기 중',10,23);
  }
  if(serverMetrics&&serverMetrics.opsPerMin){
    cx.fillStyle='#6688AA';cx.fillRect(134,10,1,16);
    cx.fillStyle='#88BBDD';cx.font='bold 12px "Malgun Gothic",sans-serif';
    cx.fillText(serverMetrics.opsPerMin+' ops/m',140,23);
  }
  // Agent online indicator on HUD
  cx.fillStyle=agentOnline?'#44CC44':'#CC0000';
  cx.fillRect(w-24,8,6,6);cx.fillStyle='#FFF';
  cx.font='8px monospace';cx.textAlign='right';
  cx.fillText(agentOnline?'ON':'OFF',w-8,14);
  cx.restore();
  fr++;
  mainCx.drawImage(buf,0,0);
}

// ── SUPABASE REALTIME CONNECTION (replaces SSE) ──
// ══════════════════════════════════════════════════════

function getParams(){
  const p=new URLSearchParams(location.search);
  return {
    url: p.get('url') || localStorage.getItem('sb_url') || '',
    key: p.get('key') || localStorage.getItem('sb_key') || '',
    session: p.get('session') || localStorage.getItem('sb_session') || '',
  };
}

function doConnect(){
  const url=document.getElementById('cfgUrl').value.trim();
  const key=document.getElementById('cfgKey').value.trim();
  const session=document.getElementById('cfgSession').value.trim();
  if(!url||!key||!session)return alert('모든 항목을 입력해주세요');
  localStorage.setItem('sb_url',url);
  localStorage.setItem('sb_key',key);
  localStorage.setItem('sb_session',session);
  connectWith(url,key,session);
}

let reconnectAttempts=0, reconnectTimer=null, agentOnline=false, connParams=null;

function connectWith(url,key,sessionId){
  connParams={url,key,sessionId};
  document.getElementById('setupOverlay').style.display='none';
  document.getElementById('mainApp').style.display='';
  initCanvas();
  requestAnimationFrame(render);

  const sbLib=window.supabase;
  if(!sbLib||!sbLib.createClient){
    document.getElementById('cs').innerHTML='SDK 오류';
    narr('Supabase SDK 로드 실패!');return;
  }

  sbClient=sbLib.createClient(url,key,{realtime:{params:{eventsPerSecond:10}}});
  const channelName='claude:'+sessionId;
  channel=sbClient.channel(channelName,{config:{broadcast:{ack:true,self:false}}});

  // ── Audit Events ──
  channel.on('broadcast',{event:'audit'},({payload})=>{
    entries.push(payload);lastET=Date.now();onE(payload);sUI();
    if(!panelOpen||currentPanel!=='log'){newLogCount++;updateBadge('logBadge',newLogCount)}
    // Track sparkline data
    addSpark('ops',1);
    if(payload.err||payload.decision==='deny')addSpark('errs',1);else addSpark('errs',0);
  });

  // ── Status ──
  channel.on('broadcast',{event:'status'},({payload})=>{
    if(payload.system){if(!serverMetrics)serverMetrics={};
      Object.assign(serverMetrics,payload.system);}
    sUI();
  });

  // ── Metrics ──
  channel.on('broadcast',{event:'metrics'},({payload})=>{
    serverMetrics=payload;sUI();
  });

  // ── Command Ack/Result ──
  channel.on('broadcast',{event:'command-ack'},({payload})=>{
    updateCmdStatus(payload.id,payload.status,payload.reason);
    toast(payload.status==='queued'?'명령 큐 추가됨':'명령 거부: '+(payload.reason||''),payload.status==='queued'?'ok':'er');
  });
  channel.on('broadcast',{event:'command-result'},({payload})=>{
    updateCmdResult(payload.id,payload.result,payload.exitCode);
    toast(payload.exitCode===0?'명령 완료':'명령 실패 (code '+payload.exitCode+')',payload.exitCode===0?'ok':'er');
  });

  // ── Presence ──
  channel.on('presence',{event:'sync'},()=>{
    const state=channel.presenceState();
    const al=Object.values(state).flat().filter(p=>p.role==='agent');
    setAgentOnline(al.length>0);
  });
  channel.on('presence',{event:'join'},({newPresences})=>{
    if(newPresences.find(p=>p.role==='agent')){setAgentOnline(true);
      narr('에이전트 온라인! 실시간 모니터링 시작.','agent');toast('에이전트 접속','ok')}
  });
  channel.on('presence',{event:'leave'},()=>{
    const state=channel.presenceState();
    const al=Object.values(state).flat().filter(p=>p.role==='agent');
    setAgentOnline(al.length>0);
    if(!al.length)toast('에이전트 오프라인','er');
  });

  // ── Subscribe with exponential backoff ──
  channel.subscribe(async(status)=>{
    const cs=document.getElementById('cs'),lv=document.getElementById('lv'),sig=document.getElementById('sig');
    if(status==='SUBSCRIBED'){
      connected=true;reconnectAttempts=0;
      cs.className='conn on';cs.innerHTML='실시간'+sig.outerHTML;
      lv.className='live on';sig.className='signal';
      narr('Supabase 연결! 실시간 모니터링 시작.');
      await channel.track({role:'mobile',online_at:new Date().toISOString()});
    }else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){
      connected=false;
      cs.className='conn off';cs.innerHTML=(status==='TIMED_OUT'?'시간초과':'오류')+' (재연결...)'+sig.outerHTML;
      lv.className='live off';sig.className='signal weak';
      scheduleReconnect();
    }
  });
}

function scheduleReconnect(){
  if(reconnectTimer)return;
  reconnectAttempts++;
  const delay=Math.min(1000*Math.pow(2,reconnectAttempts),30000);
  reconnectTimer=setTimeout(()=>{reconnectTimer=null;
    if(!connected&&connParams){
      channel?.unsubscribe();sbClient?.removeChannel(channel);
      connectWith(connParams.url,connParams.key,connParams.sessionId);
    }
  },delay);
}

function setAgentOnline(online){
  agentOnline=online;
  if(online)narr('에이전트 활성 중','agent');
  else narr('에이전트 대기 중...');
}

// ── Event Handler (same as SSE onE) ──
function onE(e){
  const ai=t2a(e.tool),ag=agents.find(a=>a.i===ai),ds=desc(e);
  if(ag&&ag.st!=='work'){ag.go(ds);spawnP(DESKS[ag.i].x*cW(),cH()*.55,4)}
  else if(ag&&ag.st==='work'){ag.tk=ds;ag.wt=Math.max(ag.wt,40)}
  if(e.decision==='deny'){
    narr(pick(NR.deny),'agent');
    spawnP(cW()/2,cH()*.3,6,'error');
    triggerShake(4);
    toast('차단: '+(e.cmd||e.tool||'').slice(0,30),'er');
  }else if(e.err){
    spawnP(DESKS[ai].x*cW(),cH()*.5,4,'error');
    const p=NR[e.tool]||NR.idle;narr(pick(p),AT[ai]);
  }else{
    const p=NR[e.tool]||NR.idle;narr(pick(p),AT[ai]);
  }
}

// ── UI (throttled) ──
let uiD=false,uiT=null;
function sUI(){if(!uiD){uiD=true;if(!uiT)uiT=setTimeout(()=>{uiT=null;uiD=false;uUI()},500)}}
function uUI(){
  const d=entries,al=d.reduce((a,e)=>a+(e.decision==='allow'?1:0),0),
    dn=d.reduce((a,e)=>a+(e.decision==='deny'?1:0),0);
  // Top bar stats with delta
  document.getElementById('sT').textContent=d.length;
  const sAel=document.getElementById('sA');sAel.textContent=al;
  const deltaEl=document.getElementById('sAd');
  if(d.length>prevTotal){const diff=d.length-prevTotal;deltaEl.textContent='+'+diff;deltaEl.className='delta up';
    setTimeout(()=>deltaEl.textContent='',2000)}
  prevTotal=d.length;
  document.getElementById('sD').textContent=dn;
  if(serverMetrics)document.getElementById('sO').textContent=serverMetrics.opsPerMin||'-';
  document.getElementById('lc').textContent=d.length;
  const mcEl=document.getElementById('mc');
  if(mcEl&&serverMetrics)mcEl.textContent=`${serverMetrics.opsPerMin||0}/m`;
  if(panelOpen)renderPanel();
}

// ── Panel Content Rendering ──
function renderPanel(){
  const body=document.getElementById('panelBody');if(!body)return;
  switch(currentPanel){
    case 'log':body.innerHTML=rLogHTML();break;
    case 'metrics':body.innerHTML=rStatHTML();break;
    case 'agents':body.innerHTML=rAgHTML();break;
    case 'cmd':body.innerHTML=rCmdHTML();
      const inp=document.getElementById('cmdInput');if(inp)inp.focus();break;
  }
}

function rLogHTML(){
  return entries.slice(-40).reverse().map(e=>{
    const cl=e.decision==='deny'?'er':e.err?'er':e.decision==='allow'?'ok':e.level==='warn'?'wr':'in';
    const tm=(e.ts||'').slice(11,19), tl=tk(e.tool);
    const gBadge=e.group?`<span style="color:#8B7860;font-size:8px;margin-right:2px">${e.group}</span>`:'';
    let dt='';if(e.err)dt='⚠ '+e.err.slice(0,40);
    else if(e.cmd)dt=e.cmd.slice(0,50);else if(e.path)dt=e.path.split(/[/\\]/).slice(-2).join('/');
    else if(e.summary)dt=e.summary.slice(0,50);else dt=desc(e);
    const seqTag=e.seq?`<span style="color:#AAA;font-size:8px;margin-right:2px">#${e.seq}</span>`:'';
    return`<div class="le ${cl}">${seqTag}<span class="t">${tm}</span><span class="n">${tl}</span>${gBadge}<span class="m">${esc(dt)}</span></div>`
  }).join('')||'<div style="text-align:center;color:#8B7860;padding:20px">아직 이벤트가 없습니다</div>';
}

function rStatHTML(){
  const d=entries,m=serverMetrics;
  let successRate=100,blockRate=0,opsMin='0',errs=0,blocks=0,total=d.length,sessions=0,durMin=0;
  const grp={'file-io':0,shell:0,search:0,external:0,agent:0,edit:0};
  if(m&&m.total>0){
    successRate=m.successRate||100;blockRate=m.blockRate||0;
    opsMin=m.opsPerMin||0;errs=m.errorCount||0;blocks=Math.round(m.blockRate*m.total/100)||0;
    total=m.total;sessions=m.sessions||0;durMin=m.durationMin||0;
    if(m.groups)Object.entries(m.groups).forEach(([k,v])=>{if(grp[k]!==undefined)grp[k]=v.count||v});
  }else{
    d.forEach(e=>{
      if(!e.tool)return;
      if('Read Write Edit NotebookEdit'.includes(e.tool))grp['file-io']++;
      else if(e.tool==='Bash')grp.shell++;
      else if(e.tool==='Grep'||e.tool==='Glob')grp.search++;
      else if(e.tool.startsWith('mcp__')||e.tool==='WebSearch'||e.tool==='WebFetch')grp.external++;
      else if('Task Skill TaskCreate TaskUpdate'.includes(e.tool))grp.agent++;
      if(e.ok===false)errs++;if(e.decision==='deny')blocks++;
    });
    successRate=total>0?((total-errs)/total*100)|0:100;
    blockRate=total>0?(blocks/total*100)|0:0;
    opsMin=total>=2?(total/Math.max(1,(new Date(d[d.length-1].ts)-new Date(d[0].ts))/6e4)).toFixed(1):'0';
  }
  let h='<div style="font-size:12px;color:var(--gold-dd);font-weight:bold;margin:4px 0 8px">시스템 메트릭</div>';
  h+=`<div class="sb"><span class="n">성공률</span><div class="b"><div class="f" style="width:${successRate}%;background:${successRate>90?'var(--ok)':'var(--err)'}"></div>${drawSparkSvg(sparkData.ops,'#44AA4480',60,12)}</div><span class="v">${Math.round(successRate)}%</span></div>`;
  h+=`<div class="sb"><span class="n">차단률</span><div class="b"><div class="f" style="width:${Math.min(blockRate*10,100)}%;background:var(--err)"></div>${drawSparkSvg(sparkData.errs,'#CC330080',60,12)}</div><span class="v">${Math.round(blockRate)}%</span></div>`;
  h+=`<div class="sb"><span class="n">속도</span><div class="b"><div class="f" style="width:${Math.min(opsMin*5,100)}%;background:var(--info)"></div></div><span class="v">${opsMin}/m</span></div>`;
  h+='<div style="font-size:12px;color:var(--gold-dd);font-weight:bold;margin:10px 0 8px">도구 그룹</div>';
  const gMetrics=[['파일I/O',grp['file-io']+grp.edit,'var(--ok)'],['셸',grp.shell,'#FF6644'],['검색',grp.search,'var(--info)'],['외부',grp.external,'var(--warn)'],['에이전트',grp.agent,'#AA88FF']];
  const gmx=Math.max(1,...gMetrics.map(m2=>m2[1]));
  gMetrics.forEach(([n,v,co])=>{
    h+=`<div class="sb"><span class="n">${n}</span><div class="b"><div class="f" style="width:${(v/gmx*100)|0}%;background:${co}"></div></div><span class="v">${v}</span></div>`;
  });
  h+=`<div style="font-size:10px;color:#8B7860;margin-top:8px;padding:6px;background:#FFF8E8;border-radius:6px">총 <b>${total}</b> | 에러 <b>${errs}</b> | 차단 <b>${blocks}</b>${sessions?' | '+sessions+'세션':''}${durMin?' | '+durMin+'분':''}</div>`;
  return h;
}

    return`<div class="cmd-entry"><span class="ct">${esc(c.command)}</span><span class="cs ${stCls}">${c.status}${c.reason?' : '+esc(c.reason):''}</span><br><span style="color:#8B7860;font-size:9px">${c.ts.toLocaleTimeString('ko-KR')}</span>${c.result?'<div style="margin-top:3px;padding:4px 6px;background:var(--panel);border:1px solid #D4B896;border-radius:4px;font-size:10px;max-height:80px;overflow:auto;white-space:pre-wrap">'+esc(String(c.result))+'</div>':''}</div>`;
  }).join('');
  h+='</div></div>';
  return h;
}

// ══════════════════════════════════════════════════════
// ── COMMAND SENDING (Mobile → Agent) ──
// ══════════════════════════════════════════════════════
const cmdHistory=[];

function sendCmd(){
  const input=document.getElementById('cmdInput');
  const cmd=input.value.trim();
  if(!cmd||!channel)return;
  const id='cmd-'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  channel.send({
    type:'broadcast',
    event:'command',
    payload:{id,command:cmd,priority:'normal'},
  });
  cmdHistory.unshift({id,command:cmd,status:'pending',ts:new Date()});
  renderCmdHist();
  input.value='';
}

function quickCmd(cmd){
  document.getElementById('cmdInput').value=cmd;
  sendCmd();
}

function requestStatus(){
  if(!channel)return;
  channel.send({type:'broadcast',event:'status-request',payload:{}});
  narr('상태 요청 전송...');
}

function updateCmdStatus(id,status,reason){
  const cmd=cmdHistory.find(c=>c.id===id);
  if(cmd){cmd.status=status;if(reason)cmd.reason=reason;renderCmdHist()}
}

function updateCmdResult(id,result,exitCode){
  const cmd=cmdHistory.find(c=>c.id===id);
  if(cmd){cmd.result=result;cmd.exitCode=exitCode;cmd.status=exitCode===0?'completed':'failed';renderCmdHist()}
}

function renderCmdHist(){
  document.getElementById('cmdCount').textContent=cmdHistory.length;
  const el=document.getElementById('cmdHist');
  el.innerHTML=cmdHistory.slice(0,30).map(c=>{
    const stCls=c.status==='queued'||c.status==='completed'?'queued':c.status==='rejected'||c.status==='failed'?'rejected':'pending';
    return`<div class="cmd-entry"><span class="ct">${esc(c.command)}</span><span class="cs ${stCls}">${c.status}${c.reason?' : '+esc(c.reason):''}</span><br><span style="color:#8B7860;font-size:9px">${c.ts.toLocaleTimeString('ko-KR')}</span>${c.result?'<div style="margin-top:2px;padding:2px 4px;background:#FFF0D0;border:1px solid #D4B896;border-radius:2px;font-size:9px;max-height:60px;overflow:auto;white-space:pre-wrap">'+esc(String(c.result))+'</div>':''}</div>`
  }).join('');
}

// ── Utils ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}

// ── Idle narration ──
setInterval(()=>{if(Date.now()-lastET>12000)narr(pick(NR.idle))},8000);

// ── Canvas Touch Support (improved hit detection) ──
document.getElementById('c').addEventListener('touchstart',(e)=>{
  const touch=e.touches[0];
  const rect=cv.getBoundingClientRect();
  const sx=cW()/rect.width, sy=cH()/rect.height;
  const cx2=(touch.clientX-rect.left)*sx, cy2=(touch.clientY-rect.top)*sy;
  // Hit test - check agents and desks
  const hitAgent=agents.find(a=>{
    const ax=a.x*cW(), ay=a.y*cH();
    return Math.abs(cx2-ax)<30*P/5&&Math.abs(cy2-ay)<40*P/5;
  });
  if(hitAgent){
    const c2=C[hitAgent.t];
    narr(`${c2.l} Lv.${hitAgent.lv} (${c2.r}) - ${hitAgent.st==='work'?'작업: '+hitAgent.tk:hitAgent.st==='walk'?'이동 중':'대기'} [${hitAgent.tot}ops]`,AT[hitAgent.i]);
    // Tap feedback: spawn particles
    spawnP(hitAgent.x*cW(),hitAgent.y*cH()-20,3);
  }
},{passive:true});

// ── Bottom sheet swipe-down to close ──
let sheetStartY=0;
document.getElementById('panelSheet')?.addEventListener('touchstart',e=>{
  sheetStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('panelSheet')?.addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-sheetStartY;
  if(dy>80)closePanel();
},{passive:true});

// ── Drag & Drop JSONL ──
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer?.files[0];
  if(f){const r=new FileReader();r.onload=v=>{entries=v.target.result.trim().split('\n').filter(Boolean).map(l=>{try{return JSON.parse(l)}catch{return null}}).filter(Boolean);entries.forEach(e2=>onE(e2));sUI();toast(`로그 로드! ${entries.length}건`,'ok');narr(`로그 로드! ${entries.length}건`)};r.readAsText(f)}});

// ── Visibility change: reconnect when app returns to foreground ──
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&!connected&&connParams){
    scheduleReconnect();
  }
});

// ── Auto-connect on load ──
window.addEventListener('DOMContentLoaded',()=>{
  const p=getParams();
  if(p.url&&p.key&&p.session){
    connectWith(p.url,p.key,p.session);
  }else{
    document.getElementById('setupOverlay').style.display='flex';
    document.getElementById('cfgUrl').value=p.url;
    document.getElementById('cfgKey').value=p.key;
    document.getElementById('cfgSession').value=p.session;
  }
});
</script>
