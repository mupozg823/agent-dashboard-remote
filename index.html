<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1A1A3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;에이전트 개발국&quot;,&quot;short_name&quot;:&quot;개발국&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%231A1A3A&quot;,&quot;theme_color&quot;:&quot;%231A1A3A&quot;}">
<title>에이전트 개발국 ++ (Remote)</title>
</head>
<body>
<!-- Setup Overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>에이전트 개발국 ++ Remote</h2>
    <label>Supabase URL</label>
    <input id="cfgUrl" placeholder="https://xxxx.supabase.co" autocomplete="off">
    <label>Anon Key</label>
    <input id="cfgKey" placeholder="eyJhbGci..." autocomplete="off">
    <label>Session ID</label>
    <input id="cfgSession" placeholder="relay 시작 시 표시된 Session ID">
    <button id="connectBtn">접속</button>
    <div class="hint">설정은 localStorage에 저장됩니다. URL 파라미터로도 전달 가능.</div>
  </div>
</div>

<!-- Main App -->
<div class="app" id="mainApp" style="display:none">
<div class="top">
  <div class="live off" id="lv"></div>
  <div class="logo">개발국 <span class="sub">Remote</span></div>
  <div class="stats">
    <div class="stat"><b id="sT">0</b>작업</div>
    <div class="stat"><b id="sA">0</b><span class="delta" id="sAd"></span>승인</div>
    <div class="stat"><b id="sD">0</b>차단</div>
    <div class="stat"><b id="sO">-</b>ops/m</div>
  </div>
</div>

<div class="scene">
  <canvas id="c"></canvas>
  <div class="conn off" id="cs">연결 대기<span class="signal" id="sig"><i></i><i></i><i></i><i></i></span></div>
  <div class="toast-wrap" id="toastWrap"></div>
</div>

<!-- Floor Nav -->
<div class="floor-nav" id="floorNav">
  <button class="floor-btn active" data-f="0" id="fbtn0">1F<span class="fbadge" id="fb0"></span></button>
  <button class="floor-btn" data-f="1" id="fbtn1">2F<span class="fbadge" id="fb1"></span></button>
  <button class="floor-btn" data-f="2" id="fbtn2">3F<span class="fbadge" id="fb2"></span></button>
  <button class="floor-btn bldg" data-f="b" id="fbtnB">🏢</button>
  <span class="floor-name" id="floorName">1F 코딩 연구실</span>
</div>

<div class="narr">
  <div class="face" id="nf">SYS</div>
  <div class="txt" id="nt">에이전트 개발국 Remote에 오신 것을 환영합니다!</div>
  <div class="cur">▼</div>
</div>

<nav class="bnav">
  <button class="nb active" data-p="log" id="navLog">
    <span class="ico">📜</span><span>로그</span><span class="badge" id="logBadge">0</span>
  </button>
  <button class="nb" data-p="metrics" id="navMetrics">
    <span class="ico">📊</span><span>메트릭</span>
  </button>
  <button class="nb" data-p="agents" id="navAgents">
    <span class="ico">👥</span><span>직원</span>
  </button>
  <button class="nb" data-p="cmd" id="navCmd">
    <span class="ico">💬</span><span>명령</span><span class="badge" id="cmdBadge">0</span>
  </button>
</nav>
</div>

<button class="fab" id="fabBtn">💬</button>

<div class="panel-overlay" id="panelOverlay">
  <div class="panel-sheet" id="panelSheet">
    <div class="panel-handle"></div>
    <div class="panel-tabs">
      <button class="ptab active" data-p="log" id="ptabLog">📜 활동 로그 <span id="lc" style="color:var(--accent)">0</span></button>
      <button class="ptab" data-p="metrics" id="ptabMetrics">📊 메트릭스 <span id="mc"></span></button>
      <button class="ptab" data-p="agents" id="ptabAgents">👥 직원 8</button>
      <button class="ptab" data-p="cmd" id="ptabCmd">💬 명령 <span id="cmdCount">0</span></button>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="skel" style="height:20px;margin-bottom:6px"></div>
      <div class="skel" style="height:20px;margin-bottom:6px;width:80%"></div>
      <div class="skel" style="height:20px;width:60%"></div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
